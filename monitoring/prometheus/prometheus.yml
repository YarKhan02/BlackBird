global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: blackbird
    metrics_path: /metrics
    static_configs:
      # The BlackBird app runs on the host; host.docker.internal resolves to
      # the Docker host on Docker Desktop (Windows/macOS).
      - targets: ["host.docker.internal:8080"]
        labels:
          service: blackbird
